<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Righteous&display=swap" rel="stylesheet">
    <style>
        :root { --primary-orange: #FF6B00; --dark-grey: #1A1A1B; --light-grey: #333335; --text-white: #EEEEEE; }
        body { margin: 0; background-color: var(--dark-grey); font-family: 'Montserrat', sans-serif; color: var(--text-white); overflow-x: hidden; }
        .bg-glow { position: fixed; top: 50%; left: 50%; width: 400px; height: 400px; background: var(--primary-orange); filter: blur(150px); opacity: 0.15; z-index: -1; transform: translate(-50%, -50%); }
        nav { padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Righteous', cursive; font-size: 2rem; color: var(--primary-orange); text-transform: uppercase; }
        .hero { height: 80vh; display: flex; align-items: center; justify-content: space-around; padding: 0 10%; perspective: 1000px; }
        .content h1 { font-size: 5rem; font-weight: 900; line-height: 1; text-transform: uppercase; }
        .content span { color: var(--primary-orange); }
        .image-container { position: relative; width: 350px; height: 450px; background: var(--light-grey); border-radius: 20px; transform-style: preserve-3d; transition: transform 0.5s ease; box-shadow: 20px 20px 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .image-container:hover { transform: rotateY(15deg) rotateX(10deg); }
        .image-container img { width: 90%; border-radius: 15px; transform: translateZ(50px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .btn { display: inline-block; margin-top: 2rem; padding: 15px 40px; background: var(--primary-orange); color: white; text-decoration: none; font-weight: bold; border-radius: 50px; transition: 0.3s; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 107, 0, 0.5); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav><div class="logo">PORTFOLIO</div></nav>
    <section class="hero">
        <div class="content">
            <h1>STAY<br><span>BOLD.</span></h1>
            <p>Welcome to my unique 3D portfolio space.</p>
            <a href="#" class="btn">VIEW PROJECTS</a>
        </div>
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1593642532400-2682810df593?q=80&w=500" alt="3D Visual">
        </div>
    </section>
</body>
</html>
